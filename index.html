<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Law Board</title>
<style>
  :root {
    --parchment-1: #f0e2bd;
    --parchment-2: #d9c089;
    --parchment-edge: #8a6a32;
    --ink: #2a1c0a;
    --ink-soft: #5b4423;
    --wax-red: #b3261c;
    --wax-red-dark: #6e0f0a;
    --gold: #b48a3c;
    --shadow: rgba(40, 25, 5, 0.35);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: "Garamond", "Georgia", "Times New Roman", serif;
    color: var(--ink);
    overflow: hidden;
  }

  body {
    background:
      radial-gradient(ellipse at top, #c9a566 0%, #8b6a30 50%, #4d3712 100%);
    position: relative;
  }

  /* Parchment noise overlay across the whole screen */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.2  0 0 0 0 0.12  0 0 0 0 0.03  0 0 0 0.18 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.45;
    pointer-events: none;
    z-index: 0;
  }

  /* Decorative columns on the sides */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background:
      linear-gradient(to right, rgba(0,0,0,0.35), transparent 8%, transparent 92%, rgba(0,0,0,0.35)),
      repeating-linear-gradient(to bottom, transparent 0 60px, rgba(0,0,0,0.06) 60px 62px);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  /* ============ HEADER ============ */
  header.banner {
    flex: 0 0 auto;
    text-align: center;
    padding: 18px 20px 10px;
    background:
      linear-gradient(to bottom, rgba(0,0,0,0.25), transparent),
      linear-gradient(to bottom, #2a1c0a, #4a3517);
    color: #f0d68b;
    border-bottom: 4px double var(--gold);
    box-shadow: 0 4px 18px var(--shadow);
    position: relative;
  }
  header.banner h1 {
    margin: 0;
    font-size: clamp(28px, 4.2vw, 56px);
    letter-spacing: 0.18em;
    font-variant: small-caps;
    text-shadow: 0 2px 0 #000, 0 0 18px rgba(255, 200, 80, 0.25);
  }
  header.banner .flourish {
    color: var(--gold);
    font-size: 1.4em;
    letter-spacing: 0.5em;
    margin-top: -4px;
  }
  header.banner .subtitle {
    font-size: clamp(11px, 1.1vw, 14px);
    letter-spacing: 0.4em;
    color: #c8a45a;
    margin-top: 2px;
    font-variant: small-caps;
  }
  header.banner .timer-row {
    margin-top: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 22px;
    font-variant: small-caps;
    letter-spacing: 0.15em;
    color: #e6c578;
    font-size: clamp(14px, 1.4vw, 22px);
  }
  .countdown {
    font-family: "Courier New", monospace;
    font-size: clamp(28px, 3.2vw, 48px);
    color: #fff1c2;
    background: rgba(0,0,0,0.4);
    padding: 6px 22px;
    border: 1px solid var(--gold);
    border-radius: 4px;
    letter-spacing: 0.1em;
    font-weight: bold;
  }
  .countdown.paused { color: #aaa; }
  .countdown.fire { color: #ff7b5e; text-shadow: 0 0 12px #ff5a3a; }

  /* ============ MAIN LAYOUT ============ */
  main.idle {
    flex: 1 1 auto;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 16px;
    padding: 16px;
    min-height: 0;
  }
  main.idle.no-side { grid-template-columns: 1fr; }

  .board {
    background: linear-gradient(160deg, var(--parchment-1), var(--parchment-2));
    border: 3px solid var(--parchment-edge);
    border-radius: 6px;
    box-shadow: inset 0 0 60px rgba(110, 70, 20, 0.35), 0 10px 30px var(--shadow);
    padding: 24px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .board::before {
    content: "";
    position: absolute;
    inset: 8px;
    border: 1px dashed rgba(110, 70, 20, 0.4);
    pointer-events: none;
    border-radius: 3px;
  }
  .board h2 {
    margin: 0 0 14px;
    text-align: center;
    font-variant: small-caps;
    letter-spacing: 0.25em;
    color: var(--ink-soft);
    font-size: clamp(14px, 1.3vw, 18px);
    border-bottom: 1px solid rgba(110, 70, 20, 0.3);
    padding-bottom: 8px;
  }
  .board-empty {
    text-align: center;
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 18vh;
    font-size: clamp(24px, 2.4vw, 38px);
    opacity: 0.7;
  }
  .law-card.single {
    flex: 1;
    background: linear-gradient(140deg, #faecc4, #e2c98a);
    border: 3px solid var(--parchment-edge);
    border-radius: 8px;
    /* Tight top padding pulls the label up near the front of the box. */
    padding: clamp(14px, 1.6vw, 28px) clamp(32px, 3.5vw, 70px) clamp(32px, 3.5vw, 70px);
    position: relative;
    box-shadow: 0 8px 24px var(--shadow), inset 0 0 60px rgba(110, 70, 20, 0.22);
    color: var(--ink);
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    text-align: center;
    font-weight: 700;
    word-wrap: break-word;
  }
  .law-card .law-content {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(8px, 1.5vh, 24px);
    overflow: hidden;
  }
  .law-card .law-name {
    font-size: calc(clamp(44px, 6vw, 130px) * var(--law-scale, 1));
    line-height: 1.05;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.02em;
    color: var(--ink);
  }
  .law-card .law-text {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(clamp(26px, 3.5vw, 80px) * var(--law-scale, 1));
    line-height: 1.2;
    font-weight: 500;
  }
  .law-card .law-label {
    font-size: clamp(14px, 1.2vw, 24px);
    font-variant: small-caps;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
    opacity: 0.75;
    font-weight: normal;
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(110, 70, 20, 0.25);
    padding-bottom: 8px;
  }
  .law-card .seal {
    position: absolute;
    bottom: -12px;
    right: -12px;
    width: 56px;
    height: 56px;
    background: radial-gradient(circle at 30% 30%, #d63a2e, var(--wax-red-dark));
    border-radius: 50%;
    box-shadow: 0 3px 6px rgba(0,0,0,0.4), inset 0 0 12px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f7d57a;
    font-size: 22px;
    font-weight: bold;
    transform: rotate(-12deg);
  }

  .sidebar {
    background: linear-gradient(160deg, #e8d49a, #c9a560);
    border: 3px solid var(--parchment-edge);
    border-radius: 6px;
    box-shadow: 0 10px 30px var(--shadow);
    padding: 16px;
    overflow: auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .sidebar h3 {
    margin: 0 0 8px;
    text-align: center;
    font-variant: small-caps;
    letter-spacing: 0.2em;
    color: var(--ink-soft);
    font-size: 14px;
    border-bottom: 1px solid rgba(110, 70, 20, 0.3);
    padding-bottom: 6px;
  }
  .pool-list {
    flex: 1;
    overflow: auto;
    margin-top: 6px;
  }
  .pool-item {
    padding: 6px 8px;
    border-bottom: 1px dotted rgba(110, 70, 20, 0.3);
    font-size: 12.5px;
    color: var(--ink);
    line-height: 1.3;
    font-style: italic;
  }
  .pool-count {
    text-align: center;
    color: var(--ink-soft);
    font-size: 11px;
    font-variant: small-caps;
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }

  /* ============ FOOTER (controls) ============ */
  footer.controls {
    flex: 0 0 auto;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 14px;
    padding: 14px 20px 18px;
    background: linear-gradient(to top, rgba(0,0,0,0.4), transparent);
  }
  button.btn {
    font-family: inherit;
    font-variant: small-caps;
    letter-spacing: 0.18em;
    cursor: pointer;
    border: none;
    transition: transform 0.1s, filter 0.15s, box-shadow 0.15s;
  }
  button.btn:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.08); }
  button.btn:active:not(:disabled) { transform: translateY(1px); }
  button.btn:disabled { opacity: 0.45; cursor: not-allowed; }

  button.primary {
    background: linear-gradient(180deg, #c92d22, #7a1410);
    color: #fff2c2;
    padding: 14px 38px;
    font-size: clamp(16px, 1.7vw, 22px);
    border-radius: 6px;
    border: 2px solid #4a0a07;
    box-shadow: 0 6px 0 #4a0a07, 0 10px 18px rgba(0,0,0,0.5);
    text-shadow: 0 1px 0 #4a0a07;
  }
  button.primary:active:not(:disabled) {
    box-shadow: 0 2px 0 #4a0a07, 0 4px 8px rgba(0,0,0,0.4);
    transform: translateY(3px);
  }

  button.secondary {
    background: linear-gradient(180deg, #5a4220, #2e1f0a);
    color: #e6c578;
    padding: 8px 16px;
    font-size: 12px;
    border-radius: 4px;
    border: 1px solid #1a1004;
  }

  /* ============ SETUP SCREEN ============ */
  .setup {
    flex: 1 1 auto;
    overflow: auto;
    padding: 32px clamp(16px, 5vw, 80px);
  }
  .setup-panel {
    max-width: 900px;
    margin: 0 auto;
    background: linear-gradient(160deg, var(--parchment-1), var(--parchment-2));
    border: 3px solid var(--parchment-edge);
    border-radius: 8px;
    box-shadow: inset 0 0 60px rgba(110, 70, 20, 0.35), 0 10px 30px var(--shadow);
    padding: 32px;
  }
  .setup-panel h2 {
    text-align: center;
    margin: 0 0 6px;
    font-variant: small-caps;
    letter-spacing: 0.2em;
    font-size: clamp(20px, 2.4vw, 30px);
  }
  .setup-panel p.lede {
    text-align: center;
    color: var(--ink-soft);
    font-style: italic;
    margin: 0 0 22px;
  }
  .setup-config {
    display: flex;
    gap: 18px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
    margin: 0 0 22px;
    padding: 14px;
    border-top: 1px solid rgba(110, 70, 20, 0.3);
    border-bottom: 1px solid rgba(110, 70, 20, 0.3);
  }
  .setup-config label {
    font-variant: small-caps;
    letter-spacing: 0.12em;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .setup-config input[type=number] {
    width: 70px;
    padding: 6px 8px;
    font-family: inherit;
    font-size: 16px;
    border: 1.5px solid var(--parchment-edge);
    background: #fff8e0;
    border-radius: 4px;
  }
  .law-edit-list {
    max-height: 50vh;
    overflow: auto;
    padding-right: 8px;
    border: 1px dashed rgba(110, 70, 20, 0.35);
    padding: 8px;
    border-radius: 4px;
    background: rgba(255, 248, 224, 0.4);
  }
  .law-edit-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
  }
  .law-edit-row .num {
    color: var(--ink-soft);
    font-size: 12px;
    width: 28px;
    text-align: right;
    font-variant: small-caps;
  }
  .law-edit-row input[type=text] {
    flex: 1;
    padding: 6px 10px;
    font-family: inherit;
    font-size: 14px;
    border: 1px solid var(--parchment-edge);
    background: #fff8e0;
    border-radius: 3px;
  }
  .law-edit-row button {
    background: #6e0f0a;
    color: #f0d68b;
    border: none;
    padding: 4px 10px;
    font-family: inherit;
    cursor: pointer;
    border-radius: 3px;
    font-size: 12px;
  }
  .setup-actions {
    margin-top: 18px;
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .add-law-btn {
    background: linear-gradient(180deg, #6b5320, #3a2a0e);
    color: #f0d68b;
    border: 1px solid #1a1004;
    padding: 8px 18px;
    margin-top: 10px;
    cursor: pointer;
    font-family: inherit;
    font-variant: small-caps;
    letter-spacing: 0.12em;
    border-radius: 4px;
  }

  /* ============ VOTING SCREEN ============ */
  .voting {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    padding: 24px;
    position: relative;
  }
  .voting h2 {
    text-align: center;
    margin: 0 0 18px;
    font-variant: small-caps;
    letter-spacing: 0.3em;
    color: #f0d68b;
    font-size: clamp(20px, 2.6vw, 34px);
    text-shadow: 0 2px 0 #000;
  }
  .vote-cards {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 24px;
    align-items: stretch;
  }
  .vote-card {
    background: linear-gradient(150deg, #faecc4, #d9b970);
    border: 4px double var(--parchment-edge);
    border-radius: 8px;
    box-shadow: 0 14px 40px var(--shadow), inset 0 0 60px rgba(110, 70, 20, 0.25);
    padding: 36px 30px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: center;
    font-size: clamp(22px, 2.8vw, 40px);
    line-height: 1.35;
    color: var(--ink);
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    position: relative;
  }
  .vote-card:hover {
    transform: translateY(-6px) scale(1.01);
    box-shadow: 0 20px 50px rgba(0,0,0,0.55), inset 0 0 80px rgba(180, 138, 60, 0.4);
  }
  .vote-card.tint-b { background: linear-gradient(150deg, #f4e2b0, #c9a25c); }
  .vote-card .vote-label {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-variant: small-caps;
    letter-spacing: 0.4em;
    font-size: 14px;
    color: var(--ink-soft);
    opacity: 0.7;
  }
  .vote-card .vote-name {
    font-size: clamp(28px, 3vw, 52px);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 18px;
    line-height: 1.1;
  }
  .vote-card .vote-desc {
    font-size: clamp(18px, 2.2vw, 34px);
    line-height: 1.3;
    font-weight: 500;
  }
  .vs {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f0d68b;
    font-variant: small-caps;
    letter-spacing: 0.3em;
    font-size: clamp(18px, 1.8vw, 26px);
    text-shadow: 0 2px 0 #000;
  }
  .vote-cancel {
    position: absolute;
    top: 12px;
    right: 16px;
    color: #f0d68b;
    opacity: 0.6;
    cursor: pointer;
    font-size: 13px;
    font-variant: small-caps;
    letter-spacing: 0.15em;
  }
  .vote-cancel:hover { opacity: 1; }

  /* ============ ENACTING OVERLAY ============ */
  .enacting-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .enacting-card {
    background: linear-gradient(150deg, #faecc4, #d9b970);
    border: 4px double var(--parchment-edge);
    border-radius: 8px;
    padding: 50px 60px;
    max-width: 70vw;
    text-align: center;
    font-size: clamp(22px, 2.6vw, 36px);
    line-height: 1.35;
    color: var(--ink);
    position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    animation: cardSlide 0.4s ease;
  }
  @keyframes cardSlide {
    from { transform: translateY(40px) scale(0.9); opacity: 0; }
    to   { transform: translateY(0)    scale(1);   opacity: 1; }
  }
  .enacting-card .enacting-name {
    font-size: clamp(36px, 4.5vw, 80px);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 18px;
    line-height: 1.1;
  }
  .enacting-card .enacting-desc {
    font-size: clamp(20px, 2.4vw, 36px);
    line-height: 1.3;
    margin-top: 14px;
    font-weight: 500;
  }

  .stamp {
    position: absolute;
    top: -30px;
    right: -30px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle at 35% 30%, #d63a2e, var(--wax-red-dark));
    border-radius: 50%;
    box-shadow: 0 6px 14px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #f7d57a;
    font-variant: small-caps;
    letter-spacing: 0.25em;
    font-size: 28px;
    font-weight: bold;
    transform: rotate(-18deg) scale(0);
    animation: stampDrop 0.55s cubic-bezier(0.5, 1.6, 0.4, 1) 0.25s forwards;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    border: 3px solid #4a0805;
  }
  .stamp::before {
    content: "";
    position: absolute;
    inset: 12px;
    border: 2px dashed rgba(247, 213, 122, 0.6);
    border-radius: 50%;
  }
  .stamp small {
    font-size: 11px;
    letter-spacing: 0.3em;
    margin-top: 4px;
    opacity: 0.85;
  }
  @keyframes stampDrop {
    0%   { transform: rotate(-30deg) scale(2.5); opacity: 0; }
    60%  { transform: rotate(-15deg) scale(0.9); opacity: 1; }
    80%  { transform: rotate(-20deg) scale(1.08); }
    100% { transform: rotate(-18deg) scale(1); }
  }

  #confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 60;
  }

  /* ============ TOAST / SETTINGS MODAL ============ */
  .modal-back {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 40;
  }
  .modal {
    background: linear-gradient(160deg, var(--parchment-1), var(--parchment-2));
    border: 3px solid var(--parchment-edge);
    border-radius: 6px;
    padding: 24px 28px;
    min-width: 320px;
    max-width: 480px;
    box-shadow: 0 14px 40px rgba(0,0,0,0.6);
  }
  .modal h3 {
    margin: 0 0 14px;
    font-variant: small-caps;
    letter-spacing: 0.2em;
    text-align: center;
  }
  .modal .row {
    margin: 10px 0;
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: space-between;
  }
  .modal-actions {
    margin-top: 18px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }
</style>
</head>
<body>
  <div id="app"></div>
  <canvas id="confetti"></canvas>
<script>

let chantBuffer = null, chantDecoding = false;
let gongBuffer  = null, gongDecoding  = false;

function base64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr.buffer;
}

function ensureSamples() {
  if (!audioCtx) return;
  if (!chantBuffer && !chantDecoding) {
    chantDecoding = true;
    audioCtx.decodeAudioData(base64ToArrayBuffer(CHANT_AUDIO_B64),
      buf => { chantBuffer = buf; chantDecoding = false; },
      err => { console.warn("chant decode failed:", err); chantDecoding = false; });
  }
  if (!gongBuffer && !gongDecoding) {
    gongDecoding = true;
    audioCtx.decodeAudioData(base64ToArrayBuffer(GONG_AUDIO_B64),
      buf => { gongBuffer = buf; gongDecoding = false; },
      err => { console.warn("gong decode failed:", err); gongDecoding = false; });
  }
}

function playSample(buf, gain) {
  if (state.config.muted) return;
  ensureAudio();           // sets up ctx + kicks off decode if not yet running
  if (!buf) return;        // decoded buffer not ready — silent this time
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const g = audioCtx.createGain();
  g.gain.value = gain;
  src.connect(g).connect(audioCtx.destination);
  src.start();
}

/* ===== State management ===== */
// v2: single-active-law model. activeLawId points to the current "law of the
// realm"; all laws live permanently in poolLaws and cycle through the active
// slot via voting.
const STORAGE_KEY = "lawboard.state.v3";

const blankState = () => ({
  config: { intervalMinutes: 10, muted: false },
  poolLaws: DEFAULT_LAWS.map((text, i) => ({ id: `l${i + 1}`, text })),
  activeLawId: null,
  currentVote: null,
  timerStartedAt: null,
  paused: true,
  phase: "setup",
  nextId: DEFAULT_LAWS.length + 1,
  showSettings: false,
});

let state = loadState() || blankState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    parsed.showSettings = false;
    // "enacting" is a transient state owned by an in-flight setTimeout. If a
    // refresh interrupts it, that timer is gone — recover to idle.
    if (parsed.phase === "enacting") {
      parsed.phase = "idle";
      parsed.currentVote = null;
      parsed.paused = false;
      parsed.timerStartedAt = Date.now();
    }
    return parsed;
  } catch {
    return null;
  }
}

function persist() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn("Persist failed:", e);
  }
}

function setState(patch) {
  Object.assign(state, patch);
  persist();
  render();
}

/* ===== Utilities ===== */
function uid() {
  return "l" + state.nextId++;
}
function pickTwoRandom(list) {
  if (list.length < 2) return null;
  const i = Math.floor(Math.random() * list.length);
  let j;
  do { j = Math.floor(Math.random() * list.length); } while (j === i);
  return [list[i], list[j]];
}
function findLaw(id) {
  return state.poolLaws.find(l => l.id === id);
}
function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
// Laws are stored as "Name: Description"; split on the first colon so the
// renderer can show the name as a heading and the description below.
function parseLaw(text) {
  const idx = text.indexOf(":");
  if (idx === -1) return { name: null, description: text };
  return { name: text.slice(0, idx).trim(), description: text.slice(idx + 1).trim() };
}
function intervalMs() {
  return Math.max(0.1, state.config.intervalMinutes) * 60 * 1000;
}
function msUntilNextVote() {
  if (state.paused || state.timerStartedAt == null) return null;
  return Math.max(0, intervalMs() - (Date.now() - state.timerStartedAt));
}
function fmtCountdown(ms) {
  if (ms == null) return "PAUSED";
  const total = Math.ceil(ms / 1000);
  const m = Math.floor(total / 60);
  const s = total % 60;
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

// Shrink the active-law content (name + description together) only if it
// overflows. CSS sizes both via calc(... * var(--law-scale, 1)) so adjusting
// the CSS variable scales them in lockstep. Binary search to ~0.003 in 8 iter.
function fitActiveLaw() {
  const card = document.querySelector(".law-card.single");
  const content = card?.querySelector(".law-content");
  if (!content) return;
  card.style.setProperty("--law-scale", "1");
  const overflows = () => content.scrollHeight > content.clientHeight + 1;
  if (!overflows()) return;
  let lo = 0.35, hi = 1.0;
  for (let i = 0; i < 8; i++) {
    const mid = (lo + hi) / 2;
    card.style.setProperty("--law-scale", String(mid));
    if (overflows()) hi = mid; else lo = mid;
  }
  card.style.setProperty("--law-scale", String(lo));
}

/* ===== Actions ===== */
function beginSession() {
  if (state.poolLaws.length < 2) {
    alert("At least two laws are required to convene the Senate.");
    return;
  }
  // First user gesture of the game — set up the AudioContext now so the
  // embedded gong/chant samples are already decoded by the time we need them.
  ensureAudio();
  setState({
    phase: "idle",
    paused: false,
    timerStartedAt: Date.now(),
    currentVote: null,
  });
}

function startVote() {
  if (state.phase !== "idle") return;
  // Exclude the current active law from the voting pool — the vote is always
  // a chance to REPLACE the current ruler, not re-elect it.
  const candidates = state.poolLaws.filter(l => l.id !== state.activeLawId);
  const pair = pickTwoRandom(candidates);
  if (!pair) return;
  playGong();
  setState({
    phase: "voting",
    currentVote: { leftId: pair[0].id, rightId: pair[1].id },
    paused: true,
  });
}

function cancelVote() {
  setState({
    phase: "idle",
    currentVote: null,
    paused: false,
    timerStartedAt: Date.now(),
  });
}

function pickWinner(winnerId) {
  if (state.phase !== "voting" || !state.currentVote) return;
  const winner = findLaw(winnerId);
  if (!winner) return;
  state.activeLawId = winnerId;
  state.phase = "enacting";
  state.currentVote = { ...state.currentVote, winnerId };
  persist();
  render();
  playFanfare();
  fireConfetti();

  // Build the enacting overlay as a one-shot side effect (NOT inside render),
  // so subsequent re-renders during the enacting phase — e.g., the user
  // clicking Settings — don't spawn a duplicate overlay.
  const winnerP = parseLaw(winner.text);
  const overlay = document.createElement("div");
  overlay.className = "enacting-overlay";
  overlay.innerHTML = `
    <div class="enacting-card">
      The Realm Has Spoken
      ${winnerP.name ? `<div class="enacting-name">${escapeHtml(winnerP.name)}</div>` : ""}
      <div class="enacting-desc">${escapeHtml(winnerP.description)}</div>
      <div class="stamp">ENACTED<small>by the Realm</small></div>
    </div>
  `;
  document.body.appendChild(overlay);

  setTimeout(() => {
    overlay.remove();
    setState({
      phase: "idle",
      currentVote: null,
      paused: false,
      timerStartedAt: Date.now(),
    });
  }, 4200);
}

function togglePause() {
  if (state.phase !== "idle") return;
  if (state.paused) {
    setState({ paused: false, timerStartedAt: Date.now() });
  } else {
    setState({ paused: true });
  }
}

function resetTimer() {
  if (state.phase !== "idle") return;
  setState({ timerStartedAt: Date.now(), paused: false });
}

function resetGame() {
  if (!confirm("Reset the entire session? All enacted laws will be cleared.")) return;
  state = blankState();
  persist();
  render();
}

function openSettings() { setState({ showSettings: true }); }
function closeSettings() { setState({ showSettings: false }); }
function setMuted(m) { state.config.muted = m; persist(); render(); }
function setInterval_(min) {
  const n = Math.max(1, Math.min(60, Number(min) || 10));
  state.config.intervalMinutes = n;
  persist();
  render();
}

/* SETUP edits */
function setupAddLaw() {
  state.poolLaws.push({ id: uid(), text: "" });
  persist();
  render();
  setTimeout(() => {
    const inputs = document.querySelectorAll(".law-edit-row input[type=text]");
    inputs[inputs.length - 1]?.focus();
  }, 0);
}
function setupRemoveLaw(id) {
  state.poolLaws = state.poolLaws.filter(l => l.id !== id);
  persist();
  render();
}
function setupEditLaw(id, text) {
  const l = state.poolLaws.find(x => x.id === id);
  if (l) { l.text = text; persist(); }
}
function setupRestoreDefaults() {
  if (!confirm("Replace the current law list with the default 36 laws?")) return;
  state.poolLaws = DEFAULT_LAWS.map((text, i) => ({ id: `l${i + 1}`, text }));
  state.nextId = DEFAULT_LAWS.length + 1;
  persist();
  render();
}

/* ===== Rendering ===== */
const app = document.getElementById("app");

function render() {
  // Modal lives outside #app; strip any stale instance before re-deciding.
  document.querySelectorAll(".modal-back").forEach(el => el.remove());
  if (state.phase === "setup") renderSetup();
  else if (state.phase === "voting") renderVoting();
  else renderIdleOrEnacting();
  if (state.showSettings) renderSettingsModal();
}

function bannerHtml(showTimer) {
  const ms = msUntilNextVote();
  let cdClass = "countdown";
  if (state.paused) cdClass += " paused";
  else if (ms != null && ms < 10000) cdClass += " fire";
  const cd = state.phase === "idle" && showTimer
    ? `<div class="timer-row">
         <span>Next decree in</span>
         <span class="${cdClass}">${fmtCountdown(ms)}</span>
       </div>`
    : "";
  return `
    <header class="banner">
      <h1>The Law Board</h1>
      ${cd}
    </header>
  `;
}

function renderSetup() {
  const lawsHtml = state.poolLaws.map((l, i) => `
    <div class="law-edit-row">
      <span class="num">${i + 1}.</span>
      <input type="text" value="${escapeHtml(l.text)}" data-edit-id="${l.id}">
      <button data-remove-id="${l.id}">remove</button>
    </div>
  `).join("");

  app.innerHTML = `
    ${bannerHtml(false)}
    <div class="setup">
      <div class="setup-panel">
        <h2>Convene the Session</h2>
        <p class="lede">Compose thy laws below. They may be edited, removed, or added unto. Once the session begins, the timer shall do the rest.</p>

        <div class="setup-config">
          <label>Vote every
            <input type="number" id="interval-input" min="1" max="60" value="${state.config.intervalMinutes}"> minutes
          </label>
          <label>
            <input type="checkbox" id="mute-input" ${state.config.muted ? "checked" : ""}>
            mute the gavel
          </label>
        </div>

        <div class="law-edit-list">
          ${lawsHtml || `<p style="text-align:center;font-style:italic;color:var(--ink-soft);">No laws. Add at least two.</p>`}
        </div>

        <button class="add-law-btn" id="add-law">&#x271A; Add a Law</button>

        <div class="setup-actions">
          <button class="btn primary" id="begin">&#x2696; Begin the Session</button>
          <button class="btn secondary" id="restore-defaults">Restore Defaults</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById("begin").onclick = beginSession;
  document.getElementById("add-law").onclick = setupAddLaw;
  document.getElementById("restore-defaults").onclick = setupRestoreDefaults;
  document.getElementById("interval-input").onchange = e => setInterval_(e.target.value);
  document.getElementById("mute-input").onchange = e => setMuted(e.target.checked);
  app.querySelectorAll("input[data-edit-id]").forEach(el => {
    el.addEventListener("input", e => setupEditLaw(el.dataset.editId, e.target.value));
  });
  app.querySelectorAll("button[data-remove-id]").forEach(el => {
    el.onclick = () => setupRemoveLaw(el.dataset.removeId);
  });
}

function renderIdleOrEnacting() {
  const activeLaw = state.activeLawId ? findLaw(state.activeLawId) : null;
  // Vote pool excludes the active law (replacement, not re-election),
  // so we need ≥ 2 candidates beyond the current ruler.
  const canVote = state.poolLaws.filter(l => l.id !== state.activeLawId).length >= 2;
  const voteLabel = canVote ? "Convene the Vote" : "Not Enough Laws";

  const parsedActive = activeLaw ? parseLaw(activeLaw.text) : null;
  const board = activeLaw
    ? `<div class="law-card single">
         <div class="law-label">The Law of the Realm</div>
         <div class="law-content">
           ${parsedActive.name ? `<div class="law-name">${escapeHtml(parsedActive.name)}</div>` : ""}
           <div class="law-text"><span>${escapeHtml(parsedActive.description)}</span></div>
         </div>
         <div class="seal">&#10070;</div>
       </div>`
    : `<div class="board-empty">No law yet decreed. Convene the vote to begin.</div>`;

  app.innerHTML = `
    ${bannerHtml(true)}
    <main class="idle no-side">
      <div class="board">
        ${board}
      </div>
    </main>
    <footer class="controls">
      <button class="btn primary" id="convene" ${canVote ? "" : "disabled"}>
        &#x2696; ${voteLabel}
      </button>
      <button class="btn secondary" id="pause">${state.paused ? "Resume Timer" : "Pause Timer"}</button>
      <button class="btn secondary" id="reset-timer">Reset Timer</button>
      <button class="btn secondary" id="settings">Settings</button>
    </footer>
  `;

  document.getElementById("convene").onclick = startVote;
  document.getElementById("pause").onclick = togglePause;
  document.getElementById("reset-timer").onclick = resetTimer;
  document.getElementById("settings").onclick = openSettings;

  fitActiveLaw();
}

function renderVoting() {
  const left = findLaw(state.currentVote.leftId);
  const right = findLaw(state.currentVote.rightId);
  if (!left || !right) {
    // Stale vote, recover
    setState({ phase: "idle", currentVote: null, paused: false, timerStartedAt: Date.now() });
    return;
  }
  const leftP = parseLaw(left.text);
  const rightP = parseLaw(right.text);
  const voteCardHtml = (id, parsed, tint, label) => `
    <div class="vote-card${tint ? " tint-b" : ""}" data-pick="${id}">
      <div class="vote-label">${label}</div>
      ${parsed.name ? `<div class="vote-name">${escapeHtml(parsed.name)}</div>` : ""}
      <div class="vote-desc">${escapeHtml(parsed.description)}</div>
    </div>
  `;
  app.innerHTML = `
    ${bannerHtml(false)}
    <div class="voting">
      <h2>Two Laws Are Proposed &mdash; Choose Which Shall Pass</h2>
      <div class="vote-cards">
        ${voteCardHtml(left.id, leftP, false, "Proposal the First")}
        <div class="vs">vs.</div>
        ${voteCardHtml(right.id, rightP, true, "Proposal the Second")}
      </div>
      <span class="vote-cancel" id="vote-cancel">&laquo; cancel</span>
    </div>
  `;
  app.querySelectorAll("[data-pick]").forEach(el => {
    el.onclick = () => pickWinner(el.dataset.pick);
  });
  document.getElementById("vote-cancel").onclick = cancelVote;
}

function renderSettingsModal() {
  const back = document.createElement("div");
  back.className = "modal-back";
  back.innerHTML = `
    <div class="modal">
      <h3>Settings</h3>
      <div class="row">
        <span>Vote every (minutes)</span>
        <input type="number" id="modal-interval" min="1" max="60" value="${state.config.intervalMinutes}" style="width:80px;padding:4px 8px;border:1px solid var(--parchment-edge);background:#fff8e0;font-family:inherit;">
      </div>
      <div class="row">
        <span>Mute the gavel</span>
        <input type="checkbox" id="modal-mute" ${state.config.muted ? "checked" : ""}>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" id="modal-close">Close</button>
        <button class="btn secondary" id="modal-reset" style="background:linear-gradient(180deg,#6e0f0a,#2e0604);">Reset Game</button>
      </div>
    </div>
  `;
  document.body.appendChild(back);
  back.querySelector("#modal-close").onclick = closeSettings;
  back.querySelector("#modal-reset").onclick = () => { closeSettings(); resetGame(); };
  back.querySelector("#modal-interval").onchange = e => setInterval_(e.target.value);
  back.querySelector("#modal-mute").onchange = e => setMuted(e.target.checked);
  back.addEventListener("click", e => { if (e.target === back) closeSettings(); });
}

/* ===== Audio ===== */
let audioCtx = null;
function ensureAudio() {
  audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  ensureSamples();  // kick off the one-time decode of both samples
  return audioCtx;
}

function playGong() {
  playSample(gongBuffer, 0.9);
}

function playFanfare() {
  playSample(chantBuffer, 0.95);
}

/* ===== Confetti ===== */
const confettiCanvas = document.getElementById("confetti");
const cctx = confettiCanvas.getContext("2d");
let confettiParticles = [];
let confettiRaf = null;

function resizeCanvas() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function fireConfetti() {
  const colors = ["#c92d22", "#b48a3c", "#f0d68b", "#6e0f0a", "#2a1c0a", "#d63a2e", "#e6c578"];
  const w = window.innerWidth;
  for (let i = 0; i < 140; i++) {
    confettiParticles.push({
      x: w / 2 + (Math.random() - 0.5) * 200,
      y: window.innerHeight / 2 - 80,
      vx: (Math.random() - 0.5) * 14,
      vy: -Math.random() * 14 - 4,
      g: 0.35 + Math.random() * 0.2,
      size: 5 + Math.random() * 6,
      rot: Math.random() * Math.PI * 2,
      vr: (Math.random() - 0.5) * 0.4,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 0,
      maxLife: 130 + Math.random() * 60,
    });
  }
  if (!confettiRaf) tickConfetti();
}

function tickConfetti() {
  cctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  confettiParticles = confettiParticles.filter(p => p.life < p.maxLife);
  for (const p of confettiParticles) {
    p.vy += p.g;
    p.x += p.vx;
    p.y += p.vy;
    p.rot += p.vr;
    p.life++;
    const alpha = 1 - p.life / p.maxLife;
    cctx.save();
    cctx.translate(p.x, p.y);
    cctx.rotate(p.rot);
    cctx.globalAlpha = Math.max(0, alpha);
    cctx.fillStyle = p.color;
    cctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
    cctx.restore();
  }
  if (confettiParticles.length > 0) {
    confettiRaf = requestAnimationFrame(tickConfetti);
  } else {
    confettiRaf = null;
  }
}

/* ===== Timer tick (countdown + auto-vote) ===== */
setInterval(() => {
  if (state.phase !== "idle" || state.paused || state.timerStartedAt == null) return;
  if (state.poolLaws.length < 2) return;
  const remaining = msUntilNextVote();
  if (remaining != null && remaining <= 0) {
    startVote();
  } else {
    // Re-render only the countdown text without a full re-render to keep it cheap.
    const el = document.querySelector(".countdown");
    if (el) {
      el.textContent = fmtCountdown(remaining);
      el.classList.toggle("fire", remaining < 10000);
    }
  }
}, 500);

/* ===== Boot ===== */
render();
</script>
</body>
</html>
